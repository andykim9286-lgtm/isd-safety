<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safety AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #212121;
    --surface: #2f2f2f;
    --surface2: #383838;
    --border: rgba(255,255,255,0.08);
    --text: #ececec;
    --text-dim: rgba(255,255,255,0.45);
    --text-muted: rgba(255,255,255,0.2);
    --accent1: #78BE00;
    --accent2: #00A878;
    --accent3: #4A90D9;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* 9:16 고정 컨테이너 */
  .phone {
    width: 100vw;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  /* ── 상단 상태바 ── */
  .statusbar {
    flex-shrink: 0;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    background: var(--bg);
  }

  .statusbar-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .statusbar-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .statusbar-icons svg {
    width: 16px; height: 16px;
    fill: var(--text);
    opacity: 0.8;
  }

  /* ── 헤더 ── */
  .header {
    flex-shrink: 0;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .header-back {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.6;
  }

  .header-back svg { width: 20px; height: 20px; stroke: var(--text); fill: none; stroke-width: 2; }

  .header-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .header-sub {
    font-size: 11px;
    color: var(--accent1);
    opacity: 0.7;
  }

  .header-more {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.5;
  }

  .header-more svg { width: 18px; height: 18px; fill: var(--text); }

  /* ── 채팅 영역 ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: none;
  }

  .messages::-webkit-scrollbar { display: none; }

  /* ── 시작 화면 ── */
  .welcome {
    position: absolute;
    inset: 0; padding-top: 100px; padding-bottom: 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 24px 24px;
    transition: opacity 0.5s ease, transform 0.5s ease;
    z-index: 10;
    background: var(--bg);
  }

  .welcome.hidden {
    opacity: 0;
    transform: translateY(-16px);
    pointer-events: none;
  }

  .welcome-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(120,190,0,0.15), rgba(0,168,120,0.15));
    border: 1px solid rgba(120,190,0,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }

  .welcome-title {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    line-height: 1.4;
  }

  .welcome-input-wrap {
    width: 100%;
    position: relative;
  }

  .welcome-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 22px;
    padding: 14px 50px 14px 18px;
    font-size: 15px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    resize: none;
    line-height: 1.5;
  }

  .welcome-send {
    position: absolute;
    right: 8px; top: 50%; transform: translateY(-50%);
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
  }

  .welcome-send.active { background: var(--accent1); }
  .welcome-send svg { width: 15px; height: 15px; fill: white; }

  /* ── 메시지 ── */
  .msg {
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }

  .msg.show { opacity: 1; transform: translateY(0); }

  /* 유저 메시지 */
  .msg-user {
    display: flex;
    justify-content: flex-end;
  }

  .msg-user-bubble {
    background: var(--surface2);
    border-radius: 20px 20px 4px 20px;
    padding: 12px 16px;
    font-size: 15px;
    color: var(--text);
    max-width: 85%;
    line-height: 1.6;
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* AI 메시지 */
  .msg-ai {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .ai-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(120,190,0,0.18), rgba(0,168,120,0.18));
    border: 1px solid rgba(120,190,0,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .ai-body { flex: 1; min-width: 0; }

  .ai-name {
    font-size: 12px;
    font-weight: 600;
    color: rgba(120,190,0,0.65);
    letter-spacing: 0.06em;
    margin-bottom: 7px;
    text-transform: uppercase;
  }

  .ai-text {
    font-size: 15px;
    line-height: 1.85;
    color: var(--text);
  }

  .ai-text p {
    margin-bottom: 4px;
    opacity: 0;
    transform: translateY(3px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .ai-text p.show { opacity: 1; transform: translateY(0); }

  /* 강조 */
  .em-green { color: var(--accent1); font-weight: 600; }
  .em-teal  { color: var(--accent2); font-weight: 600; }
  .em-blue  { color: var(--accent3); font-weight: 600; }
  .em-white { color: #ffffff; font-weight: 700; }
  .em-dim   { color: var(--text-dim); }

  /* 액션 버튼 */
  .ai-actions {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .ai-actions.show { opacity: 1; }

  .action-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  .action-btn svg { width: 13px; height: 13px; opacity: 0.35; fill: var(--text); }

  /* 타이핑 커서 */
  .cursor {
    display: inline-block;
    width: 2px; height: 0.88em;
    background: var(--accent1);
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: blink 0.75s step-end infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ── 하단 입력창 ── */
  .bottom-bar {
    flex-shrink: 0;
    padding: 10px 16px 24px;
    background: var(--bg);
    border-top: 1px solid var(--border);
  }

  .bottom-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 10px 14px;
  }

  .bottom-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 15px;
    color: var(--text-dim);
    font-family: 'Noto Sans KR', sans-serif;
    pointer-events: none;
  }

  .bottom-mic {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.3;
  }

  .bottom-mic svg { width: 16px; height: 16px; fill: var(--text); }

  /* ── 피날레 ── */
  .finale {
    position: fixed;
    inset: 0;
    background: #0c0c0c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
    z-index: 200;
  }

  .finale.show { opacity: 1; }

  .finale-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.6s ease 0.5s;
  }

  .finale.show .finale-eyebrow { opacity: 1; }

  .finale-cross {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(32px, 10vw, 56px);
    font-weight: 500;
    letter-spacing: 0.1em;
    background: linear-gradient(90deg, #78BE00 0%, #00A878 50%, #4A90D9 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.9s ease 0.8s, transform 0.9s ease 0.8s;
  }

  .finale.show .finale-cross { opacity: 1; transform: translateY(0); }

  .finale-divider {
    width: 36px; height: 1px;
    background: rgba(255,255,255,0.1);
    opacity: 0;
    transition: opacity 0.6s ease 1.2s;
  }

  .finale.show .finale-divider { opacity: 1; }

  .finale-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.14em;
    opacity: 0;
    transition: opacity 0.8s ease 1.4s;
    text-align: center;
    padding: 0 24px;
  }

  .finale.show .finale-tagline { opacity: 1; }
</style>
</head>
<body>

<div class="phone">

  <!-- 상태바 -->
  <div class="statusbar">
    <span class="statusbar-time">9:41</span>
    <div class="statusbar-icons">
      <svg viewBox="0 0 24 24"><path d="M1 6l5 5 5-5 5 5 5-5"/></svg>
      <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="11" rx="2"/><path d="M22 11v3"/></svg>
    </div>
  </div>

  <!-- 헤더 -->
  <div class="header">
    <div class="header-back">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <div class="header-center">
      <span class="header-title">Safety AI</span>
      <span class="header-sub">● 온라인</span>
    </div>
    <div class="header-more">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </div>
  </div>

  <!-- 시작 화면 -->
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✦</div>
    <div class="welcome-title">무엇을 도와드릴까요?</div>
    <div class="welcome-input-wrap">
      <textarea class="welcome-input" id="welcomeInput" placeholder="메시지를 입력하세요..." rows="1"></textarea>
      <button class="welcome-send" id="welcomeSend">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>

  <!-- 채팅 메시지 -->
  <div class="messages" id="messages"></div>

  <!-- 하단 입력창 -->
  <div class="bottom-bar">
    <div class="bottom-wrap">
      <input class="bottom-input" id="bottomInput" placeholder="메시지를 입력하세요..." readonly/>
      <div class="bottom-mic">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/></svg>
      </div>
    </div>
  </div>

</div>

<!-- 피날레 -->
<div class="finale" id="finale">
  <span class="finale-eyebrow">Safety Campaign 2026</span>
  <div class="finale-cross">CROSS CHECK</div>
  <div class="finale-divider"></div>
  <span class="finale-tagline">믿음은 마음으로 · 확인은 두 눈으로</span>
</div>

<script>
  // ── 대화 데이터 ──
  const CONV = [
    {
      role: 'user',
      text: '비정상 슬라이드 전개, 어떻게 예방할 수 있을까?'
    },
    {
      role: 'ai',
      lines: [
        { html: '<span class="em-dim">체크리스트 강화, 반복 교육, 모니터링 강화...</span>', pause: 0 },
        { html: '이미 다 하고 있습니다.', pause: 950 },
        { html: '<span class="em-white">그래도 하루 평균 3건.</span> 모두 숙련된 승무원에게서 발생합니다.', pause: 800 },
      ]
    },
    {
      role: 'user',
      text: '그럼 왜 계속 발생하는 건가?'
    },
    {
      role: 'ai',
      lines: [
        { html: '원인은 하나입니다.', pause: 0 },
        { html: '<span class="em-green">\'설마 괜찮겠지\'라는 믿음.</span>', pause: 850 },
        { html: '하지만 그건 믿음이 아닙니다.', pause: 900 },
        { html: '믿음이 확인을 대체하는 순간, <span class="em-teal">슬라이드는 전개됩니다.</span>', pause: 800 },
      ]
    },
    {
      role: 'user',
      text: '어떻게 해결할 수 있을까?'
    },
    {
      role: 'ai',
      lines: [
        { html: '믿음은 마음으로, <span class="em-white">확인은 두 눈으로.</span>', pause: 0 },
        { html: '<span class="em-dim">숙련될수록, 익숙해질수록.</span>', pause: 1000 },
        { html: '확인을 멈추지 마세요.', pause: 900 },
        { html: '<span class="em-blue">확인이 곧 믿음입니다.</span>', pause: 1000 },
      ],
      last: true
    },
  ];

  // ── 오디오 ──
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function initAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
  }

  function playKeyClick() {
    if (!audioCtx) return;
    try {
      const now = audioCtx.currentTime;
      const sr = audioCtx.sampleRate;
      const clickSize = Math.floor(sr * 0.006);
      const clickBuf = audioCtx.createBuffer(1, clickSize, sr);
      const clickData = clickBuf.getChannelData(0);
      for (let i = 0; i < clickSize; i++) {
        clickData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / clickSize, 3);
      }
      const src = audioCtx.createBufferSource();
      src.buffer = clickBuf;
      const f = audioCtx.createBiquadFilter();
      f.type = 'highpass'; f.frequency.value = 800;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.32, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.006);
      src.connect(f); f.connect(g); g.connect(audioCtx.destination);
      src.start(now);

      const bodySize = Math.floor(sr * 0.055);
      const bodyBuf = audioCtx.createBuffer(1, bodySize, sr);
      const bodyData = bodyBuf.getChannelData(0);
      for (let i = 0; i < bodySize; i++) {
        bodyData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sr * 0.018));
      }
      const bodySrc = audioCtx.createBufferSource();
      bodySrc.buffer = bodyBuf;
      const bf = audioCtx.createBiquadFilter();
      bf.type = 'bandpass'; bf.frequency.value = 1800; bf.Q.value = 1.2;
      const bg = audioCtx.createGain();
      bg.gain.setValueAtTime(0.08, now + 0.003);
      bg.gain.exponentialRampToValueAtTime(0.001, now + 0.055);
      bodySrc.connect(bf); bf.connect(bg); bg.connect(audioCtx.destination);
      bodySrc.start(now + 0.003);
    } catch(e) {}
  }

  function playEnterSound() {
    if (!audioCtx) return;
    try {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, now);
      osc.frequency.exponentialRampToValueAtTime(440, now + 0.09);
      g.gain.setValueAtTime(0.1, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.12);
    } catch(e) {}
  }

  function playReceiveSound() {
    if (!audioCtx) return;
    try {
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
      g.gain.setValueAtTime(0.07, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(g); g.connect(audioCtx.destination);
      osc.start(now); osc.stop(now + 0.15);
    } catch(e) {}
  }

  // ── 유틸 ──
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function scrollBottom() {
    const el = document.getElementById('messages');
    el.scrollTop = el.scrollHeight;
  }

  function addUserMsg(text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg msg-user';
    div.innerHTML = `<div class="msg-user-bubble"></div>`;
    messages.appendChild(div);
    requestAnimationFrame(() => div.classList.add('show'));
    scrollBottom();
    return div.querySelector('.msg-user-bubble');
  }

  function addAiMsg() {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg msg-ai';
    const id = Date.now();
    div.innerHTML = `
      <div class="ai-avatar">✦</div>
      <div class="ai-body">
        <div class="ai-name">Safety AI</div>
        <div class="ai-text" id="t${id}"></div>
        <div class="ai-actions" id="a${id}">
          <button class="action-btn"><svg viewBox="0 0 24 24"><path d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2"/></svg></button>
          <button class="action-btn"><svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3H14z"/></svg></button>
          <button class="action-btn"><svg viewBox="0 0 24 24"><path d="M10 15v4a3 3 0 003 3l4-9V2H5.72a2 2 0 00-2 1.7l-1.38 9a2 2 0 002 2.3H10z"/></svg></button>
        </div>
      </div>`;
    messages.appendChild(div);
    requestAnimationFrame(() => div.classList.add('show'));
    return {
      textEl: div.querySelector(`#t${id}`),
      actionsEl: div.querySelector(`#a${id}`)
    };
  }

  async function typeText(el, text, speed = 40) {
    return new Promise(resolve => {
      let i = 0;
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      el.appendChild(cursor);
      const iv = setInterval(() => {
        if (i < text.length) {
          cursor.insertAdjacentText('beforebegin', text[i++]);
          playKeyClick();
        } else {
          clearInterval(iv);
          cursor.remove();
          resolve();
        }
      }, speed);
    });
  }

  // ── 메인 시퀀스 ──
  async function run() {
    await sleep(700);

    // 시작화면 타이핑
    const welcomeInput = document.getElementById('welcomeInput');
    for (let i = 0; i < CONV[0].text.length; i++) {
      welcomeInput.value += CONV[0].text[i];
      playKeyClick();
      await sleep(44);
    }

    await sleep(400);
    document.getElementById('welcomeSend').classList.add('active');
    await sleep(350);
    playEnterSound();
    await sleep(300);

    // 시작화면 → 채팅화면
    document.getElementById('welcome').classList.add('hidden');
    await sleep(350);

    // 대화 진행
    for (let ci = 0; ci < CONV.length; ci++) {
      const turn = CONV[ci];

      if (turn.role === 'user') {
        if (ci > 0) {
          const input = document.getElementById('bottomInput');
          input.value = '';
          for (let i = 0; i < turn.text.length; i++) {
            input.value += turn.text[i];
            playKeyClick();
            await sleep(40);
          }
          await sleep(300);
          playEnterSound();
          await sleep(250);
          input.value = '';
        }
        const bubble = addUserMsg(turn.text);
        // 버블 안에도 타이핑 텍스트 표시
        bubble.textContent = turn.text;
        scrollBottom();
        await sleep(500);

      } else {
        await sleep(350);
        playReceiveSound();
        const { textEl, actionsEl } = addAiMsg();

        for (let li = 0; li < turn.lines.length; li++) {
          const line = turn.lines[li];
          if (li > 0) await sleep(line.pause);

          const p = document.createElement('p');
          p.innerHTML = line.html;
          textEl.appendChild(p);
          await sleep(20);
          p.classList.add('show');
          scrollBottom();
          await sleep(280);
        }

        await sleep(250);
        actionsEl.classList.add('show');
        await sleep(turn.last ? 1800 : 800);
      }
    }

    // 피날레
    await sleep(700);
    document.getElementById('finale').classList.add('show');
  }

  // ── 시작 탭 화면 ──
  let started = false;

  function startExperience() {
    if (started) return;
    started = true;
    initAudio();
    const tap = document.getElementById('tapScreen');
    tap.style.opacity = '0';
    tap.style.pointerEvents = 'none';
    setTimeout(() => { tap.style.display = 'none'; run(); }, 500);
  }

  document.addEventListener('click', startExperience, { once: true });
  document.addEventListener('touchstart', startExperience, { once: true });

  window.addEventListener('load', () => {
    // 폰트 로딩 여유 확보 후 탭 화면 표시
    setTimeout(() => {
      document.getElementById('tapScreen').style.opacity = '1';
    }, 600);
  });
</script>

<!-- 탭 시작 화면 -->
<div id="tapScreen" style="
  position: fixed; inset: 0; z-index: 300;

  display: flex; flex-direction: column;

  gap: 20px; opacity: 0;
  transition: opacity 0.5s ease;

">

  <div style="

    font-size: 16px; font-weight: 500;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.04em;
  ">화면을 터치해서 시작</div>
  <div style="
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  ">Safety Campaign 2026</div>
</div>
